name: Stable Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    uses: ./.github/workflows/release-common.yml
    secrets: inherit
    with:
      release_title: "Stable Release"
      version_suffix: "stable"
      manifest_notes_prefix: "Stable release"
      release_intro: "Grab the latest stable nteract for macOS, Windows, or Linux. Signed, notarized, and ready to run your notebooks."
      github_release_prerelease: false
      updater_channel_tag: "stable-latest"
      updater_channel_title: "Stable Update Channel"
      updater_channel_notes: "Rolling release for the stable auto-update channel. This release always contains the latest updater manifest. Do not delete this release."
      updater_channel_prerelease: false
