name: Release Pipeline (Reusable)

on:
  workflow_call:
    inputs:
      release_title:
        description: Display name for the release job
        required: true
        type: string
      version_suffix:
        description: Suffix appended to version before short SHA
        required: true
        type: string
      manifest_notes_prefix:
        description: Prefix for latest.json notes field
        required: true
        type: string
      release_intro:
        description: Intro sentence in the GitHub release body
        required: true
        type: string
      github_release_prerelease:
        description: Whether the GitHub release is marked prerelease
        required: true
        type: boolean
      updater_channel_tag:
        description: Rolling release tag that stores updater latest.json
        required: true
        type: string
      updater_channel_title:
        description: Rolling updater channel release title
        required: true
        type: string
      updater_channel_notes:
        description: Rolling updater channel release notes
        required: true
        type: string
      updater_channel_prerelease:
        description: Whether the updater channel release is prerelease
        required: true
        type: boolean

permissions:
  contents: write

env:
  TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
  TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
  RUNT_BUILD_CHANNEL: ${{ inputs.version_suffix }}

jobs:
  compute-version:
    name: Compute Version
    runs-on: blacksmith-4vcpu-ubuntu-2404
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      timestamp: ${{ steps.version.outputs.TIMESTAMP }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute version
        id: version
        run: |
          CURRENT_VERSION=$(grep '^version' crates/runt/Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          TIMESTAMP=$(date -u +%Y%m%d%H%M)
          VERSION="${CURRENT_VERSION}-${{ inputs.version_suffix }}.${TIMESTAMP}"
          echo "Setting version to: ${VERSION}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_OUTPUT

  build-linux:
    name: Build Linux Executables
    runs-on: blacksmith-4vcpu-ubuntu-2204
    needs: compute-version
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libxdo-dev \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Set up Rust
        uses: dsherret/rust-toolchain-file@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "linux-release"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Enable corepack
        run: corepack enable

      - name: Set pnpm store directory
        run: pnpm config set store-dir ~/.pnpm-store

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install JS dependencies
        run: pnpm install

      - name: Build UI
        run: pnpm build

      - name: Set version in Cargo.toml
        run: |
          VERSION="${{ needs.compute-version.outputs.version }}"
          echo "Setting version to: ${VERSION}"
          sed -i "s/^version = .*/version = \"${VERSION}\"/" crates/runt/Cargo.toml
          sed -i "s/^version = .*/version = \"${VERSION}\"/" crates/runtimed/Cargo.toml

      # Build MCP output widget HTML (needed by runt-mcp's include_str!)
      - name: Build MCP output widget
        run: pnpm --filter nteract-mcp-app install && pnpm --filter nteract-mcp-app run build

      - name: Build for Linux x64
        run: cargo build --release --target x86_64-unknown-linux-gnu -p runt-cli

      - name: Rename binaries
        run: |
          cp target/x86_64-unknown-linux-gnu/release/runt runt-linux-x64
          chmod +x runt-linux-x64

      - name: Upload Linux executables
        uses: actions/upload-artifact@v4
        with:
          name: runt-linux-executables
          path: |
            runt-linux-x64

  build-macos:
    name: Build macOS ARM64 Executables
    runs-on: macos-latest
    needs: compute-version
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Rust
        uses: dsherret/rust-toolchain-file@v1

      - name: Install cross-compilation target
        run: rustup target add aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "macos-release"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Enable corepack
        run: corepack enable

      - name: Set pnpm store directory
        run: pnpm config set store-dir ~/.pnpm-store

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install JS dependencies
        run: pnpm install

      - name: Build UI
        run: pnpm build

      - name: Set version in Cargo.toml
        run: |
          VERSION="${{ needs.compute-version.outputs.version }}"
          echo "Setting version to: ${VERSION}"
          sed -i '' "s/^version = .*/version = \"${VERSION}\"/" crates/runt/Cargo.toml
          sed -i '' "s/^version = .*/version = \"${VERSION}\"/" crates/runtimed/Cargo.toml

      # Build MCP output widget HTML (needed by runt-mcp's include_str!)
      - name: Build MCP output widget
        run: pnpm --filter nteract-mcp-app install && pnpm --filter nteract-mcp-app run build

      - name: Build for macOS ARM64
        run: cargo build --release --target aarch64-apple-darwin -p runt-cli

      - name: Rename binaries
        run: |
          cp target/aarch64-apple-darwin/release/runt runt-darwin-arm64
          chmod +x runt-darwin-arm64

      - name: Upload macOS executables
        uses: actions/upload-artifact@v4
        with:
          name: runt-macos-executables
          path: |
            runt-darwin-arm64

  build-notebook-macos-arm64:
    name: Build macOS ARM64 Notebook
    runs-on: macos-latest
    needs: compute-version
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Rust
        uses: dsherret/rust-toolchain-file@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "macos-notebook-arm64"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Enable corepack
        run: corepack enable

      - name: Set pnpm store directory
        run: pnpm config set store-dir ~/.pnpm-store

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install JS dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install Tauri CLI
        run: cargo binstall tauri-cli --no-confirm --locked --force

      - name: Import Apple signing certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No signing certificate configured, skipping"
            exit 0
          fi

          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm $RUNNER_TEMP/certificate.p12

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Set version in tauri.conf.json
        run: |
          VERSION="${{ needs.compute-version.outputs.version }}"
          echo "Setting version to: ${VERSION}"
          CHANNEL="${RUNT_BUILD_CHANNEL:-stable}"
          if [ "$CHANNEL" = "nightly" ]; then
            PRODUCT_NAME="nteract Nightly"
            BUNDLE_ID="org.nteract.desktop.nightly"
          else
            PRODUCT_NAME="nteract"
            BUNDLE_ID="org.nteract.desktop"
          fi
          sed -i '' "s/\"version\": \"[^\"]*\"/\"version\": \"${VERSION}\"/" crates/notebook/tauri.conf.json
          sed -i '' "s/\"productName\": \"[^\"]*\"/\"productName\": \"${PRODUCT_NAME}\"/" crates/notebook/tauri.conf.json
          sed -i '' "s/\"identifier\": \"[^\"]*\"/\"identifier\": \"${BUNDLE_ID}\"/" crates/notebook/tauri.conf.json
          sed -i '' "s#https://github.com/nteract/desktop/releases/download/stable-latest/latest.json#https://github.com/nteract/desktop/releases/download/${{ inputs.updater_channel_tag }}/latest.json#" crates/notebook/tauri.conf.json
          sed -i '' "s/^version = .*/version = \"${VERSION}\"/" crates/runt/Cargo.toml
          sed -i '' "s/^version = .*/version = \"${VERSION}\"/" crates/runtimed/Cargo.toml

      - name: Generate Icons
        run: |
          CHANNEL="${RUNT_BUILD_CHANNEL:-stable}"
          ICON_SOURCE="crates/notebook/icons/source.png"
          if [ "$CHANNEL" = "nightly" ] && [ -f "crates/notebook/icons/source-nightly.png" ]; then
            ICON_SOURCE="crates/notebook/icons/source-nightly.png"
          fi
          cargo xtask icons "$ICON_SOURCE"

      # Build MCP output widget HTML (needed by runt-mcp's include_str!)
      - name: Build MCP output widget
        run: pnpm --filter nteract-mcp-app install && pnpm --filter nteract-mcp-app run build

      - name: Build external binaries
        run: |
          cargo build --release -p runtimed -p runt-cli -p mcpb-runt
          TARGET=$(rustc --print host-tuple)
          mkdir -p crates/notebook/binaries
          cp target/release/runtimed "crates/notebook/binaries/runtimed-$TARGET"
          cp target/release/runt "crates/notebook/binaries/runt-$TARGET"
          cp target/release/mcpb-runt "crates/notebook/binaries/mcpb-runt-$TARGET"

      - name: Build with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/notebook
          args: --bundles app,dmg --config '{"build":{"beforeBuildCommand":""}}'
          includeUpdaterJson: false

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          CHANNEL="${RUNT_BUILD_CHANNEL:-stable}"

          shopt -s nullglob
          DMG_BINARIES=(target/release/bundle/dmg/*.dmg)
          TAR_GZ_BINARIES=(target/release/bundle/macos/*.tar.gz)
          TAR_GZ_SIG_BINARIES=(target/release/bundle/macos/*.tar.gz.sig)
          shopt -u nullglob

          if [ ${#DMG_BINARIES[@]} -eq 0 ]; then
            echo "::error::No macOS installer (.dmg) found in target/release/bundle/dmg"
            exit 1
          fi

          cp "${DMG_BINARIES[0]}" "artifacts/nteract-${CHANNEL}-darwin-arm64.dmg"

          if [ ${#TAR_GZ_BINARIES[@]} -eq 0 ]; then
            echo "::error::No macOS updater bundle (.app.tar.gz) found in target/release/bundle/macos"
            exit 1
          fi
          if [ ${#TAR_GZ_SIG_BINARIES[@]} -eq 0 ]; then
            echo "::error::No macOS updater signature (.app.tar.gz.sig) found in target/release/bundle/macos"
            exit 1
          fi

          cp "${TAR_GZ_BINARIES[0]}" "artifacts/nteract-${CHANNEL}-darwin-arm64.app.tar.gz"
          cp "${TAR_GZ_SIG_BINARIES[0]}" "artifacts/nteract-${CHANNEL}-darwin-arm64.app.tar.gz.sig"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nteract-macos-arm64
          path: artifacts/

  build-notebook-windows-x64:
    name: Build Windows x64 Notebook
    runs-on: blacksmith-4vcpu-windows-2025
    needs: compute-version
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Set up Rust
        uses: dsherret/rust-toolchain-file@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "windows-notebook-x64"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Enable corepack
        run: corepack enable

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~\AppData\Local\pnpm\store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install JS dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Install cargo-binstall
        shell: pwsh
        run: |
          Set-ExecutionPolicy Unrestricted -Scope Process -Force
          iex (iwr "https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.ps1").Content

      - name: Install Tauri CLI
        run: cargo binstall tauri-cli --no-confirm --locked --force

      - name: Set version in tauri.conf.json
        shell: pwsh
        run: |
          $version = "${{ needs.compute-version.outputs.version }}"
          $channel = "${{ env.RUNT_BUILD_CHANNEL }}".ToLowerInvariant()
          switch ($channel) {
            "nightly" {
              $productName = "nteract Nightly"
              $bundleId = "org.nteract.desktop.nightly"
            }
            default {
              $productName = "nteract"
              $bundleId = "org.nteract.desktop"
            }
          }
          Write-Host "Setting version to: $version"
          $tauriConf = Get-Content crates/notebook/tauri.conf.json -Raw
          $tauriConf = $tauriConf -replace '"version": "[^"]+"', "`"version`": `"$version`""
          $tauriConf = $tauriConf -replace '"productName": "[^"]+"', "`"productName`": `"$productName`""
          $tauriConf = $tauriConf -replace '"identifier": "[^"]+"', "`"identifier`": `"$bundleId`""
          $tauriConf = $tauriConf -replace 'https://github.com/nteract/desktop/releases/download/stable-latest/latest.json', 'https://github.com/nteract/desktop/releases/download/${{ inputs.updater_channel_tag }}/latest.json'
          Set-Content crates/notebook/tauri.conf.json $tauriConf
          $runtCargo = Get-Content crates/runt/Cargo.toml -Raw
          $runtCargo = $runtCargo -replace '(?m)^version = ".*"$', "version = `"$version`""
          Set-Content crates/runt/Cargo.toml $runtCargo

      - name: Generate Icons
        shell: pwsh
        run: |
          $channel = "${{ env.RUNT_BUILD_CHANNEL }}".ToLowerInvariant()
          $iconSource = "crates/notebook/icons/source.png"
          if ($channel -eq "nightly" -and (Test-Path "crates/notebook/icons/source-nightly.png")) {
            $iconSource = "crates/notebook/icons/source-nightly.png"
          }
          cargo xtask icons $iconSource

      # Build MCP output widget HTML (needed by runt-mcp's include_str!)
      - name: Build MCP output widget
        run: pnpm --filter nteract-mcp-app install && pnpm --filter nteract-mcp-app run build

      - name: Build external binaries
        shell: bash
        run: |
          cargo build --release -p runtimed -p runt-cli -p mcpb-runt
          TARGET=$(rustc --print host-tuple)
          mkdir -p crates/notebook/binaries
          cp target/release/runtimed.exe "crates/notebook/binaries/runtimed-$TARGET.exe"
          cp target/release/runt.exe "crates/notebook/binaries/runt-$TARGET.exe"
          cp target/release/mcpb-runt.exe "crates/notebook/binaries/mcpb-runt-$TARGET.exe"

      - name: Build with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/notebook
          args: --bundles nsis --config '{"build":{"beforeBuildCommand":""}}'
          includeUpdaterJson: false

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          CHANNEL="${RUNT_BUILD_CHANNEL:-stable}"
          shopt -s nullglob
          NSIS_BINARIES=(target/release/bundle/nsis/*.exe)
          shopt -u nullglob

          if [ ${#NSIS_BINARIES[@]} -eq 0 ]; then
            echo "::error::No NSIS installer (.exe) found in target/release/bundle/nsis"
            exit 1
          fi

          NSIS_PATH="${NSIS_BINARIES[0]}"
          cp "$NSIS_PATH" "artifacts/nteract-${CHANNEL}-windows-x64.exe"

          NSIS_SIG_PATH="${NSIS_PATH}.sig"
          if [ -f "$NSIS_SIG_PATH" ]; then
            cp "$NSIS_SIG_PATH" "artifacts/nteract-${CHANNEL}-windows-x64.exe.sig"
          else
            echo "::error::Missing updater signature for $NSIS_PATH"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nteract-windows-x64
          path: artifacts/

  build-notebook-linux-x64:
    name: Build Linux x64 Notebook
    runs-on: blacksmith-4vcpu-ubuntu-2204
    needs: compute-version
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libxdo-dev \
            libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Set up Rust
        uses: dsherret/rust-toolchain-file@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "linux-notebook-x64"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Enable corepack
        run: corepack enable

      - name: Set pnpm store directory
        run: pnpm config set store-dir ~/.pnpm-store

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ~/.pnpm-store
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install JS dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install Tauri CLI
        run: cargo binstall tauri-cli --no-confirm --locked --force

      - name: Set version in tauri.conf.json
        run: |
          VERSION="${{ needs.compute-version.outputs.version }}"
          echo "Setting version to: ${VERSION}"
          CHANNEL="${RUNT_BUILD_CHANNEL:-stable}"
          if [ "$CHANNEL" = "nightly" ]; then
            PRODUCT_NAME="nteract Nightly"
            BUNDLE_ID="org.nteract.desktop.nightly"
          else
            PRODUCT_NAME="nteract"
            BUNDLE_ID="org.nteract.desktop"
          fi
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${VERSION}\"/" crates/notebook/tauri.conf.json
          sed -i "s/\"productName\": \"[^\"]*\"/\"productName\": \"${PRODUCT_NAME}\"/" crates/notebook/tauri.conf.json
          sed -i "s/\"identifier\": \"[^\"]*\"/\"identifier\": \"${BUNDLE_ID}\"/" crates/notebook/tauri.conf.json
          sed -i "s#https://github.com/nteract/desktop/releases/download/stable-latest/latest.json#https://github.com/nteract/desktop/releases/download/${{ inputs.updater_channel_tag }}/latest.json#" crates/notebook/tauri.conf.json
          sed -i "s/^version = .*/version = \"${VERSION}\"/" crates/runt/Cargo.toml
          sed -i "s/^version = .*/version = \"${VERSION}\"/" crates/runtimed/Cargo.toml

      - name: Generate Icons
        run: |
          CHANNEL="${RUNT_BUILD_CHANNEL:-stable}"
          ICON_SOURCE="crates/notebook/icons/source.png"
          if [ "$CHANNEL" = "nightly" ] && [ -f "crates/notebook/icons/source-nightly.png" ]; then
            ICON_SOURCE="crates/notebook/icons/source-nightly.png"
          fi
          cargo xtask icons "$ICON_SOURCE"

      # Build MCP output widget HTML (needed by runt-mcp's include_str!)
      - name: Build MCP output widget
        run: pnpm --filter nteract-mcp-app install && pnpm --filter nteract-mcp-app run build

      - name: Build external binaries
        run: |
          cargo build --release -p runtimed -p runt-cli -p mcpb-runt
          TARGET=$(rustc --print host-tuple)
          mkdir -p crates/notebook/binaries
          cp target/release/runtimed "crates/notebook/binaries/runtimed-$TARGET"
          cp target/release/runt "crates/notebook/binaries/runt-$TARGET"
          cp target/release/mcpb-runt "crates/notebook/binaries/mcpb-runt-$TARGET"

      - name: Build with tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/notebook
          args: --bundles appimage,deb --config '{"build":{"beforeBuildCommand":""}}'
          includeUpdaterJson: false

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          CHANNEL="${RUNT_BUILD_CHANNEL:-stable}"
          APPIMAGE_PATH=$(find target/release/bundle/appimage -name "*.AppImage" | head -1)
          cp "$APPIMAGE_PATH" "artifacts/nteract-${CHANNEL}-linux-x64.AppImage"
          for f in target/release/bundle/appimage/*.AppImage.sig; do
            [ -f "$f" ] && cp "$f" "artifacts/nteract-${CHANNEL}-linux-x64.AppImage.sig"
          done
          DEB_PATH=$(find target/release/bundle/deb -name "*.deb" | head -1)
          cp "$DEB_PATH" "artifacts/nteract-${CHANNEL}-linux-x64.deb"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nteract-linux-x64
          path: artifacts/

  build-nteract-package:
    name: Build nteract Package
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: compute-version
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Set dev version
        if: inputs.github_release_prerelease
        run: |
          CURRENT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          MAJOR_MINOR=$(echo "$CURRENT_VERSION" | sed 's/\.[0-9]*$//')
          PATCH=$(echo "$CURRENT_VERSION" | grep -o '[0-9]*$')
          NEXT_PATCH=$((PATCH + 1))
          TIMESTAMP="${{ needs.compute-version.outputs.timestamp }}"
          DEV_VERSION="${MAJOR_MINOR}.${NEXT_PATCH}a${TIMESTAMP}"
          echo "Setting nteract version to: ${DEV_VERSION}"
          sed -i "s/^version = .*/version = \"${DEV_VERSION}\"/" pyproject.toml
          # Pin runtimed dep to the same prerelease timestamp
          sed -i "s/runtimed>=[^,]*/runtimed>=${DEV_VERSION}/" pyproject.toml
        working-directory: python/nteract

      - name: Build sdist + wheel
        run: uv build --no-sources
        working-directory: python/nteract

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: nteract-dist
          path: dist
          if-no-files-found: error

  build-python-wheels:
    name: Build Python Wheels (${{ matrix.platform.target }})
    runs-on: ${{ matrix.platform.runner }}
    needs: compute-version
    strategy:
      matrix:
        platform:
          - runner: macos-latest
            target: aarch64-apple-darwin
          - runner: blacksmith-4vcpu-ubuntu-2404
            target: x86_64-unknown-linux-gnu
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Rust
        uses: dsherret/rust-toolchain-file@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "python-${{ matrix.platform.target }}"

      - name: Build runtimed binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cargo build --release --target ${{ matrix.platform.target }} -p runtimed
          cp target/${{ matrix.platform.target }}/release/runtimed python/runtimed/src/runtimed/_bin/
          chmod +x python/runtimed/src/runtimed/_bin/runtimed

      - name: Build runtimed binary (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.platform.target }} -p runtimed
          cp target/${{ matrix.platform.target }}/release/runtimed.exe python/runtimed/src/runtimed/_bin/

      - name: Set dev version (Unix)
        if: runner.os != 'Windows' && inputs.github_release_prerelease
        run: |
          CURRENT_VERSION=$(grep '^version' python/runtimed/pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          # Bump patch and use alpha tag so it sorts after current stable (PEP 440)
          MAJOR_MINOR=$(echo "$CURRENT_VERSION" | sed 's/\.[0-9]*$//')
          PATCH=$(echo "$CURRENT_VERSION" | grep -o '[0-9]*$')
          NEXT_PATCH=$((PATCH + 1))
          TIMESTAMP="${{ needs.compute-version.outputs.timestamp }}"
          DEV_VERSION="${MAJOR_MINOR}.${NEXT_PATCH}a${TIMESTAMP}"
          echo "Setting Python version to: ${DEV_VERSION}"
          sed -i.bak "s/^version = .*/version = \"${DEV_VERSION}\"/" python/runtimed/pyproject.toml

      - name: Set dev version (Windows)
        if: runner.os == 'Windows' && inputs.github_release_prerelease
        shell: pwsh
        run: |
          $content = Get-Content python/runtimed/pyproject.toml -Raw
          if ($content -match 'version = "([^"]+)"') {
            $currentVersion = $matches[1]
          }
          # Bump patch and use alpha tag so it sorts after current stable (PEP 440)
          $parts = $currentVersion.Split('.')
          $parts[2] = [string]([int]$parts[2] + 1)
          $nextVersion = $parts -join '.'
          $timestamp = "${{ needs.compute-version.outputs.timestamp }}"
          $devVersion = "${nextVersion}a${timestamp}"
          Write-Host "Setting Python version to: $devVersion"
          $content = $content -replace 'version = "[^"]+"', "version = `"$devVersion`""
          Set-Content python/runtimed/pyproject.toml $content -NoNewline

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          working-directory: python/runtimed
          sccache: true
          maturin-version: "v1.11.5"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.target }}
          path: python/runtimed/dist

  prerelease:
    name: ${{ inputs.release_title }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
      id-token: write
    needs:
      [
        compute-version,
        build-linux,
        build-macos,
        build-notebook-macos-arm64,
        build-notebook-windows-x64,
        build-notebook-linux-x64,
        build-python-wheels,
        build-nteract-package,
      ]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: |
          curl -sSfL https://github.com/orhun/git-cliff/releases/download/v2.7.0/git-cliff-2.7.0-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv git-cliff-*/git-cliff /usr/local/bin/

      - name: Generate changelog
        id: changelog
        run: |
          if [ "${{ inputs.github_release_prerelease }}" = "false" ]; then
            # Stable release: generate changelog since the previous stable tag.
            # We can't use --latest because nightly tags between stable releases
            # cause git-cliff to pick a nightly→stable range with zero commits.
            # Instead, find the previous stable tag and use an explicit range.
            PREV_STABLE=$(git tag -l 'v*-stable.*' --sort=-creatordate | head -1)
            if [ -n "$PREV_STABLE" ]; then
              CHANGELOG=$(git-cliff "${PREV_STABLE}..HEAD" --ignore-tags ".*nightly.*" --strip header 2>/dev/null || echo "")
            else
              CHANGELOG=$(git-cliff --strip header 2>/dev/null || echo "")
            fi
          else
            # Nightly: changelog from all unreleased commits since last tag
            CHANGELOG=$(git-cliff --unreleased --strip header 2>/dev/null || echo "")
          fi
          if [ -z "$CHANGELOG" ] || [ "$CHANGELOG" = "" ]; then
            CHANGELOG="No user-facing changes in this release."
          fi
          echo "$CHANGELOG" > changelog-section.md

      - name: Download Linux executables
        uses: actions/download-artifact@v4
        with:
          name: runt-linux-executables
          path: ./executables

      - name: Download macOS executables
        uses: actions/download-artifact@v4
        with:
          name: runt-macos-executables
          path: ./executables

      - name: Download macOS ARM64 notebook
        uses: actions/download-artifact@v4
        with:
          name: nteract-macos-arm64
          path: ./notebook-macos-arm64

      - name: Download Windows x64 notebook
        uses: actions/download-artifact@v4
        with:
          name: nteract-windows-x64
          path: ./notebook-windows-x64

      - name: Download Linux x64 notebook
        uses: actions/download-artifact@v4
        with:
          name: nteract-linux-x64
          path: ./notebook-linux-x64

      - name: Prepare release assets
        run: |
          CHANNEL="${RUNT_BUILD_CHANNEL:-stable}"
          CLI_NAME="runt"
          if [ "$CHANNEL" = "nightly" ]; then
            CLI_NAME="runt-nightly"
          fi
          mkdir -p release-assets
          # CLI binaries
          cp executables/runt-linux-x64 "release-assets/${CLI_NAME}-linux-x64"
          cp executables/runt-darwin-arm64 "release-assets/${CLI_NAME}-darwin-arm64"
          # Notebook installers
          cp "notebook-macos-arm64/nteract-${CHANNEL}-darwin-arm64.dmg" release-assets/
          cp "notebook-windows-x64/nteract-${CHANNEL}-windows-x64.exe" release-assets/
          cp "notebook-linux-x64/nteract-${CHANNEL}-linux-x64.AppImage" release-assets/
          cp "notebook-linux-x64/nteract-${CHANNEL}-linux-x64.deb" release-assets/
          # Updater bundles + signatures
          cp "notebook-macos-arm64/nteract-${CHANNEL}-darwin-arm64.app.tar.gz" release-assets/
          cp "notebook-macos-arm64/nteract-${CHANNEL}-darwin-arm64.app.tar.gz.sig" release-assets/
          cp "notebook-windows-x64/nteract-${CHANNEL}-windows-x64.exe.sig" release-assets/
          cp "notebook-linux-x64/nteract-${CHANNEL}-linux-x64.AppImage.sig" release-assets/ 2>/dev/null || true

      - name: Generate updater manifest (latest.json)
        env:
          VERSION: ${{ needs.compute-version.outputs.version }}
          TAG_NAME: v${{ needs.compute-version.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          CHANNEL="${RUNT_BUILD_CHANNEL:-stable}"
          RELEASE_BASE="https://github.com/${REPO}/releases/download/${TAG_NAME}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          require_file() {
            if [ ! -f "$1" ]; then
              echo "::error::Missing required updater asset: $1"
              exit 1
            fi
          }

          require_sig() {
            if [ ! -s "$1" ]; then
              echo "::error::Missing or empty updater signature: $1"
              exit 1
            fi
          }

          read_sig() { cat "$1"; }

          require_file "release-assets/nteract-${CHANNEL}-darwin-arm64.app.tar.gz"
          require_file "release-assets/nteract-${CHANNEL}-linux-x64.AppImage"
          require_file "release-assets/nteract-${CHANNEL}-windows-x64.exe"
          require_sig "release-assets/nteract-${CHANNEL}-darwin-arm64.app.tar.gz.sig"
          require_sig "release-assets/nteract-${CHANNEL}-linux-x64.AppImage.sig"
          require_sig "release-assets/nteract-${CHANNEL}-windows-x64.exe.sig"

          SIG_DARWIN_ARM64=$(read_sig "release-assets/nteract-${CHANNEL}-darwin-arm64.app.tar.gz.sig")
          SIG_LINUX_X64=$(read_sig "release-assets/nteract-${CHANNEL}-linux-x64.AppImage.sig")
          SIG_WINDOWS_X64=$(read_sig "release-assets/nteract-${CHANNEL}-windows-x64.exe.sig")

          jq -n \
            --arg version "$VERSION" \
            --arg notes "${{ inputs.manifest_notes_prefix }} $TAG_NAME" \
            --arg pub_date "$PUB_DATE" \
            --arg sig_darwin_arm64 "$SIG_DARWIN_ARM64" \
            --arg url_darwin_arm64 "$RELEASE_BASE/nteract-${CHANNEL}-darwin-arm64.app.tar.gz" \
            --arg sig_linux_x64 "$SIG_LINUX_X64" \
            --arg url_linux_x64 "$RELEASE_BASE/nteract-${CHANNEL}-linux-x64.AppImage" \
            --arg sig_windows_x64 "$SIG_WINDOWS_X64" \
            --arg url_windows_x64 "$RELEASE_BASE/nteract-${CHANNEL}-windows-x64.exe" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $sig_darwin_arm64, url: $url_darwin_arm64 },
                "linux-x86_64": { signature: $sig_linux_x64, url: $url_linux_x64 },
                "windows-x86_64": { signature: $sig_windows_x64, url: $url_windows_x64 }
              }
            }' > release-assets/latest.json

          echo "Generated latest.json:"
          cat release-assets/latest.json

      - name: Download Python wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: ./wheels
          merge-multiple: true

      - name: Download nteract dist
        uses: actions/download-artifact@v4
        with:
          name: nteract-dist
          path: ./nteract-dist

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Publish runtimed to PyPI
        continue-on-error: true
        run: uv publish --trusted-publishing always ./wheels/*.whl

      - name: Publish nteract to PyPI
        continue-on-error: true
        run: uv publish --trusted-publishing always ./nteract-dist/*

      - name: Generate release body
        env:
          VERSION_SUFFIX: ${{ inputs.version_suffix }}
          COMMIT_SHA: ${{ github.sha }}
          RELEASE_INTRO: ${{ inputs.release_intro }}
        run: |
          CLI_NAME="runt"
          if [ "$VERSION_SUFFIX" = "nightly" ]; then
            CLI_NAME="runt-nightly"
          fi
          {
            echo "$RELEASE_INTRO"
            echo ''
            echo '## What'\''s Changed'
            echo ''
            cat changelog-section.md
            echo ''
            echo '---'
            echo ''
            echo "**Commit:** \`${COMMIT_SHA}\`"
            echo ''
            echo '## nteract (desktop app)'
            echo ''
            echo '| Platform | Architecture | Download |'
            echo '|----------|--------------|----------|'
            echo "| macOS | ARM64 (Apple Silicon) | \`nteract-${VERSION_SUFFIX}-darwin-arm64.dmg\` |"
            echo "| Windows | x64 | \`nteract-${VERSION_SUFFIX}-windows-x64.exe\` |"
            echo "| Linux | x64 | \`nteract-${VERSION_SUFFIX}-linux-x64.AppImage\` |"
            echo "| Linux | x64 (deb) | \`nteract-${VERSION_SUFFIX}-linux-x64.deb\` |"
            echo ''
            echo "macOS builds are signed and notarized. Windows is not code signed — expect a SmartScreen prompt. Linux AppImage: \`chmod +x\` and run. Linux DEB: \`sudo dpkg -i nteract-${VERSION_SUFFIX}-linux-x64.deb\`."
            echo ''
            echo 'This release includes auto-update support. Existing installations will be notified of this update automatically.'
            echo ''
            echo '### Linux (APT repository)'
            echo ''
            echo '```bash'
            echo '# Add the nteract signing key'
            echo 'curl -fsSL https://apt.runtimed.com/nteract-keyring.gpg \'
            echo '  | sudo gpg --dearmor -o /usr/share/keyrings/nteract-keyring.gpg'
            echo ''
            echo '# Add the repository'
            echo "echo \"deb [arch=amd64 signed-by=/usr/share/keyrings/nteract-keyring.gpg] https://apt.runtimed.com ${VERSION_SUFFIX} main\" \\"
            echo '  | sudo tee /etc/apt/sources.list.d/nteract.list'
            echo ''
            echo "sudo apt update && sudo apt install nteract-${VERSION_SUFFIX}"
            echo '```'
            echo ''
            echo "## ${CLI_NAME} (CLI)"
            echo ''
            echo 'Also bundled inside the desktop app. Standalone binaries:'
            echo ''
            echo '| Platform | Architecture | Download |'
            echo '|----------|--------------|----------|'
            echo "| Linux | x64 | \`${CLI_NAME}-linux-x64\` |"
            echo "| macOS | ARM64 | \`${CLI_NAME}-darwin-arm64\` |"
            echo ''
            echo '## runtimed (Python — macOS, Linux, Windows)'
            echo ''
            echo '```bash'
            echo 'pip install runtimed --pre'
            echo '```'
          } > release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ needs.compute-version.outputs.version }}
          name: nteract v${{ needs.compute-version.outputs.version }}
          body_path: release-body.md
          draft: false
          prerelease: ${{ inputs.github_release_prerelease }}
          files: |
            ./release-assets/runt*-linux-x64
            ./release-assets/runt*-darwin-arm64
            ./release-assets/nteract-${{ inputs.version_suffix }}-linux-x64.AppImage
            ./release-assets/nteract-${{ inputs.version_suffix }}-linux-x64.AppImage.sig
            ./release-assets/nteract-${{ inputs.version_suffix }}-linux-x64.deb
            ./release-assets/nteract-${{ inputs.version_suffix }}-darwin-arm64.dmg
            ./release-assets/nteract-${{ inputs.version_suffix }}-darwin-arm64.app.tar.gz
            ./release-assets/nteract-${{ inputs.version_suffix }}-darwin-arm64.app.tar.gz.sig
            ./release-assets/nteract-${{ inputs.version_suffix }}-windows-x64.exe
            ./release-assets/nteract-${{ inputs.version_suffix }}-windows-x64.exe.sig
            ./release-assets/latest.json
            ./wheels/*.whl
            ./nteract-dist/*

      - name: Update ${{ inputs.updater_channel_tag }} updater channel
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.updater_channel_prerelease }}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          else
            PRERELEASE_FLAG=""
          fi

          # Ensure the rolling updater release exists, then update latest.json
          gh release create "${{ inputs.updater_channel_tag }}" \
            --title "${{ inputs.updater_channel_title }}" \
            --notes "${{ inputs.updater_channel_notes }}" \
            ${PRERELEASE_FLAG} \
            --latest=false 2>/dev/null || true

          gh release edit "${{ inputs.updater_channel_tag }}" --prerelease=${{ inputs.updater_channel_prerelease }} --latest=false >/dev/null 2>&1 || true

          gh release upload "${{ inputs.updater_channel_tag }}" release-assets/latest.json --clobber

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          VERSION: ${{ needs.compute-version.outputs.version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "No Discord webhook configured, skipping notification"
            exit 0
          fi

          curl -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"${{ inputs.release_title }} succeeded\",
              \"description\": \"Version \`v${VERSION}\` published successfully\",
              \"url\": \"$RUN_URL\",
              \"color\": 3066993
            }]
          }" "$DISCORD_WEBHOOK"

  publish-apt:
    name: Publish to APT Repository
    runs-on: blacksmith-4vcpu-ubuntu-2204
    needs: [build-notebook-linux-x64]
    if: github.event_name != 'pull_request'
    concurrency:
      group: apt-publish-${{ inputs.version_suffix }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download Linux x64 notebook artifact
        uses: actions/download-artifact@v4
        with:
          name: nteract-linux-x64
          path: ./linux-artifacts

      - name: Install APT publishing dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg-dev awscli

      - name: Install publish scripts
        run: |
          sudo cp scripts/apt/publish-apt.sh /usr/local/bin/publish-apt.sh
          sudo cp scripts/apt/prune-packages.py /usr/local/bin/prune-packages.py
          sudo chmod +x /usr/local/bin/publish-apt.sh /usr/local/bin/prune-packages.py

      - name: Publish .deb to APT repository
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: https://apt.runtimed.com
          GPG_KEY_ID: ${{ secrets.APT_GPG_KEY_ID }}
          GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          CHANNEL="${{ inputs.version_suffix }}"
          DEB_FILE="./linux-artifacts/nteract-${CHANNEL}-linux-x64.deb"

          if [ ! -f "$DEB_FILE" ]; then
            echo "ERROR: .deb not found at $DEB_FILE"
            ls -la ./linux-artifacts/
            exit 1
          fi

          publish-apt.sh --channel "$CHANNEL" "$DEB_FILE"
