# Python CI: lint, type-check, and unit tests for runtimed / nteract / dx / prewarm.
#
# Publishing of all Python packages (runtimed, nteract, dx) is handled by the
# desktop release pipeline (release-nightly.yml / release-stable.yml via
# release-common.yml). This workflow is CI only.

name: Python CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Detect whether Python/Rust sources changed. When they haven't
  # (e.g. a docs-only or .gitignore PR), the expensive jobs are
  # skipped but still report a passing status so required checks
  # don't block the merge queue.
  changes:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      pull-requests: read
    outputs:
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - 'pyproject.toml'
              - 'python/runtimed/**'
              - 'python/nteract/**'
              - 'python/dx/**'
              - 'python/gremlin/**'
              - 'python/prewarm/**'
              - 'crates/runtimed-py/**'
              - 'crates/runtimed/**'
              - 'apps/mcp-app/**'
              - '.github/workflows/python-package.yml'

  python-lint-and-test:
    name: Python Lint & Unit Tests
    needs: changes
    if: needs.changes.outputs.python == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install rust
        uses: dsherret/rust-toolchain-file@v1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: python-x86_64-unknown-linux-gnu

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Build and stage runtimed binary
        run: |
          cargo build -p runtimed
          cp target/debug/runtimed python/runtimed/src/runtimed/_bin/

      - name: Sync workspace
        run: uv sync

      - name: Ruff check
        run: uv run ruff check --config pyproject.toml python/nteract/src/ python/runtimed/src/ python/runtimed/tests/ python/dx/src/ python/dx/tests/ python/prewarm/src/ python/prewarm/tests/

      - name: Ruff format check
        run: uv run ruff format --check --config pyproject.toml python/nteract/src/ python/runtimed/src/ python/runtimed/tests/ python/dx/src/ python/dx/tests/ python/prewarm/src/ python/prewarm/tests/

      - name: Type check
        run: uv run ty check python/

      - name: Run runtimed-py unit tests
        working-directory: python/runtimed
        run: uv run pytest tests/test_session_unit.py tests/test_binary.py tests/test_ipython_bridge.py -v --tb=short

      - name: Run dx unit tests
        run: uv run pytest python/dx/tests/ -v --tb=short

      - name: Run prewarm unit tests
        run: |
          uv pip install -e python/prewarm
          uv run pytest python/prewarm/tests/ -v --tb=short

  python-lint-and-test-skip:
    name: Python Lint & Unit Tests
    needs: changes
    if: needs.changes.outputs.python != 'true' && github.event_name == 'pull_request'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - run: echo "Skipped — no Python/Rust changes"

  nteract-test:
    needs: changes
    if: needs.changes.outputs.python == 'true' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev --no-sources
        working-directory: python/nteract

      - name: Run smoke tests
        run: uv run pytest -v
        working-directory: python/nteract

  nteract-test-skip:
    name: nteract-test
    needs: changes
    if: needs.changes.outputs.python != 'true' && github.event_name == 'pull_request'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - run: echo "Skipped — no Python/Rust changes"
