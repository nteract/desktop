name: Weekly Preview Release

on:
  schedule:
    # Every Monday at 9am UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    uses: ./.github/workflows/releases/release-common.yml
    secrets: inherit
    with:
      release_title: "Preview Release"
      version_suffix: "preview"
      manifest_notes_prefix: "Preview release"
      release_intro: "It's runtime funtime! Grab the latest nteract preview for macOS, Windows, or Linux. Signed, notarized, and ready to run your notebooks."
      github_release_prerelease: false
      updater_channel_tag: "preview-latest"
      updater_channel_title: "Preview Update Channel"
      updater_channel_notes: "Rolling release for the preview auto-update channel. This release always contains the latest updater manifest. Do not delete this release."
      updater_channel_prerelease: false
