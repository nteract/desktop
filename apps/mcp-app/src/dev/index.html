<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>nteract MCP App — Dev Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #1a1a1a;
      color: #e5e5e5;
      padding: 24px;
    }
    h1 { font-size: 16px; font-weight: 600; margin-bottom: 24px; color: #9ca3af; }
    .chat { max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
    .turn { display: flex; flex-direction: column; gap: 8px; }
    .turn-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; }
    .turn-label.assistant { color: #d4956a; }
    .message { font-size: 14px; line-height: 1.5; color: #d1d5db; }
    .tool-call {
      background: #262626;
      border: 1px solid #374151;
      border-radius: 8px;
      overflow: hidden;
    }
    .tool-call-header {
      padding: 8px 12px;
      font-size: 12px;
      font-family: ui-monospace, SFMono-Regular, monospace;
      color: #9ca3af;
      background: #1f1f1f;
      border-bottom: 1px solid #374151;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tool-call-header .tool-icon { color: #d4956a; }
    .tool-call-body { /* MCP App widget renders here */ }
  </style>
</head>
<body>
  <div class="chat">
    <h1>nteract MCP App — Dev Preview</h1>
    <div id="root"></div>
  </div>
  <script type="module" src="./main.tsx"></script>
</body>
</html>
