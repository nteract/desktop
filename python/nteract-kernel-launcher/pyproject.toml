[project]
name = "nteract-kernel-launcher"
version = "0.1.1"
description = "Thin wrapper around ipykernel_launcher that runs nteract-specific kernel bootstrap (e.g. dx.install) before the kernel starts."
readme = "README.md"
license = "BSD-3-Clause"
authors = [
    { name = "Kyle Kelley", email = "rgbkrk@gmail.com" }
]
requires-python = ">=3.10"
dependencies = [
    "ipykernel>=6.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
only-include = ["nteract_kernel_launcher.py"]
sources = []

[dependency-groups]
dev = ["pytest>=8.0"]
