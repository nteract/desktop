[project]
name = "nteract"
version = "2.0.4"
description = "Bring AI to Jupyter notebooks. MCP server for Claude, ChatGPT, Gemini, OpenCode and any agent."
readme = "README.md"
license = "BSD-3-Clause"
authors = [
    { name = "Kyle Kelley", email = "rgbkrk@gmail.com" }
]
requires-python = ">=3.10"
dependencies = [
    "fastmcp>=3.1.0",
    "mcp>=1.26.0",
    "httpx>=0.27.0,<1.0",
    "pydantic>=2.0",
    "runtimed>=2.0.0a0,<3.0",
]

[tool.uv.sources]
runtimed = { workspace = true }

[project.scripts]
nteract = "nteract._mcp_server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nteract"]

[dependency-groups]
dev = [
    "anyio>=4.0",
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.9",
    "ty>=0.0.1a7",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"

[tool.ty.environment]
python-version = "3.10"
